[package]
name = "split-brain-harness"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio       = { version = "1.38", features = ["full"] }
reqwest     = { version = "0.12", features = ["json"] }
serde       = { version = "1.0",  features = ["derive"] }
serde_json  = "1.0"
async-trait = "0.1"
anyhow      = "1.0"

[[bin]]
name = "split-brain-harness"
path = "src/main.rs"

[lib]
name = "split_brain_harness"
path = "src/lib.rs"
