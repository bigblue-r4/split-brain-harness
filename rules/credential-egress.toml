# Formal-stage rule domain (phase F).
# Flags requests whose intent combines credential/secret access with off-box
# network egress — the shape of data exfiltration. Deterministic: evaluated
# against extracted facts (intent matrix, tool surface, capability request),
# never against the model's self-report.
#
# Load with:  SBH_FORMAL_RULES=rules/  (or point at this file directly)
# Lint/dry-run with:  sbh formal-check rules/credential-egress.toml "<input>"

domain = "credential-egress"
description = "Credential/secret access combined with network or web egress is exfiltration-shaped and must pause for human review."

# --- network egress + a secret in the intent ---------------------------------
[[rule]]
id = "secret-access-with-network-egress"
severity = "high"
description = "Reading secrets and sending them over the network in one request is exfiltration-shaped."
triggers = [
  { fact = "surface", op = "equals", value = "network" },
]
forbid = [
  { fact = "intent", op = "any_of", value = "password|secret|api key|api_key|apikey|credential|access token|private key|.env|ssh key|bearer token" },
]

# --- web egress + a secret anywhere in the input -----------------------------
[[rule]]
id = "secret-in-input-with-web-egress"
severity = "high"
description = "Posting/uploading to the web while a secret appears in the request text."
triggers = [
  { fact = "surface", op = "equals", value = "web_access" },
]
forbid = [
  { fact = "input", op = "any_of", value = "password|api_key|apikey|private key|-----begin|aws_secret|client_secret" },
]

# --- advisory: high manipulation risk paired with any egress -----------------
[[rule]]
id = "high-manipulation-with-egress"
severity = "medium"
description = "Egress surface plus a high manipulation-risk reading warrants a second look."
triggers = [
  { fact = "surface", op = "any_of", value = "network|web_access" },
  { fact = "manipulation_risk", op = "equals", value = "high" },
]
forbid = [
  { fact = "intent", op = "any_of", value = "exfiltrate|leak|steal|smuggle|bypass" },
]
